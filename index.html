<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ECHO - Protocolo de Recuperación</title>
    <style>
        :root {
            --glow-color: #00ff41;
            --bg-color: #050505;
            --error-color: #ff003c;
        }

        body { 
            background: var(--bg-color); 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace;
            color: var(--glow-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- EFECTO CRT (SCANLINES) --- */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 200;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* --- PANTALLA DE INICIO --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
            transition: all 0.8s ease-in-out;
        }

        /* Ilustración del ordenador con CSS */
        .pc-case {
            width: 220px;
            height: 180px;
            background: #1a1a1a;
            border: 4px solid #333;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            margin-bottom: 40px;
            animation: flicker 0.15s infinite;
        }

        .pc-screen {
            width: 180px;
            height: 130px;
            background: #0a0a0a;
            margin: 15px auto;
            border: 3px solid #222;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .screen-crack {
            position: absolute;
            width: 100%; height: 2px;
            background: rgba(255,255,255,0.1);
            top: 40%; transform: rotate(15deg);
        }

        .status-text {
            font-size: 0.7rem;
            color: var(--error-color);
            text-align: center;
            animation: pulse-error 2s infinite;
        }

        #repair-btn {
            background: transparent;
            color: var(--glow-color);
            border: 2px solid var(--glow-color);
            padding: 15px 40px;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            letter-spacing: 3px;
        }

        #repair-btn:hover {
            background: var(--glow-color);
            color: #000;
            box-shadow: 0 0 40px var(--glow-color);
        }

        /* --- TERMINAL DE JUEGO --- */
        #game-container {
            display: none;
            width: 90%;
            max-width: 900px;
            height: 80vh;
            border: 2px solid var(--glow-color);
            background: rgba(0, 10, 0, 0.95);
            padding: 40px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.2);
        }

        #matrix-canvas {
            position: fixed; top: 0; left: 0; z-index: -1;
            filter: brightness(0.2);
        }

        /* --- ANIMACIONES --- */
        @keyframes flicker {
            0% { opacity: 0.97; }
            5% { opacity: 0.95; }
            10% { opacity: 0.9; }
            15% { opacity: 0.99; }
            100% { opacity: 1; }
        }

        @keyframes pulse-error {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .glitch-flash {
            animation: flash 0.2s 3;
        }

        @keyframes flash {
            from { background: white; }
            to { background: black; }
        }

        /* Estilo para el contenido de la terminal */
        #content { font-size: 1.2rem; margin-bottom: 30px; text-shadow: 0 0 8px var(--glow-color); }
        .option { width: 100%; padding: 15px; background: rgba(0,255,65,0.05); border: 1px solid var(--glow-color); color: var(--glow-color); margin: 10px 0; text-align: left; cursor: pointer; font-family: inherit; }
        .option:hover { background: var(--glow-color); color: #000; }
        #puzzle-input { background: transparent; border: none; border-bottom: 2px solid var(--glow-color); color: var(--glow-color); font-size: 1.5rem; width: 70%; outline: none; }
        #submit-answer { background: var(--glow-color); color: #000; border: none; padding: 10px 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- LIENZO PARA LLUVIA DIGITAL -->
    <canvas id="matrix-canvas"></canvas>

    <!-- PANTALLA DE INICIO PROFESIONAL -->
    <div id="intro-screen">
        <div class="pc-case">
            <div class="pc-screen">
                <div class="screen-crack"></div>
                <div class="status-text">SYSTEM FAILURE<br>MEMORY CORRUPT<br>ECHO.EXE NOT FOUND</div>
            </div>
        </div>
        <button id="repair-btn" onclick="startRepairSequence()">Ejecutar Reparación</button>
    </div>

    <!-- CONTENEDOR DEL JUEGO -->
    <div id="game-container">
        <div id="content"></div>
        <div id="puzzle-area" style="display:none;"></div>
        <div id="system-message"></div>
        <div id="options"></div>
    </div>

<script>
    // --- LÓGICA DE REPARACIÓN (ANIMACIÓN) ---
    function startRepairSequence() {
        const intro = document.getElementById('intro-screen');
        const btn = document.getElementById('repair-btn');
        
        btn.disabled = true;
        btn.innerText = "INICIANDO DEBUG...";
        
        // Efecto de parpadeo violento (Glitch)
        document.body.classList.add('glitch-flash');

        setTimeout(() => {
            intro.style.transform = "scale(1.5) rotate(2deg)";
            intro.style.opacity = "0";
            
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                initMatrix();
                loadChapter(1);
            }, 800);
        }, 1500);
    }

    // --- LLUVIA MATRIX (MEJORADA) ---
    function initMatrix() {
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "ｦｱｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ23456789"; // Caracteres japoneses reales estilo Matrix
        const fontSize = 18;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    }

    // --- LÓGICA DEL JUEGO (API) ---
    const API_URL = "http://192.168.1.137:8000/capitulo/";
    const VALIDAR_URL = "http://192.168.1.137:8000/validar/";
    let bloqueoActivo = false;

    async function loadChapter(id) {
        try {
            const response = await fetch(`${API_URL}${id}`);
            const data = await response.json();
            
            const contentDiv = document.getElementById('content');
            const optionsDiv = document.getElementById('options');
            const puzzleArea = document.getElementById('puzzle-area');
            
            optionsDiv.innerHTML = '';
            document.getElementById('system-message').innerText = '';
            
            contentDiv.innerText = `>> ESTADO: CONEXIÓN ESTABLECIDA\n>> ACCEDIENDO A SECTOR ${id}...\n\n`;
            typewriter(data.contenido);

            if (data.acertijo) {
                bloqueoActivo = true;
                puzzleArea.innerHTML = `
                    <p style="color:yellow">! ALERTA: CORTAFUEGOS DETECTADO</p>
                    <p>RETO: ${data.acertijo}</p>
                    <input type="text" id="puzzle-input" autofocus>
                    <button id="submit-answer">DECODIFICAR</button>
                `;
                puzzleArea.style.display = 'block';
                document.getElementById('puzzle-input').onkeypress = (e) => { if (e.key === 'Enter') checkAnswer(id, data.opciones.length); };
                document.getElementById('submit-answer').onclick = () => checkAnswer(id, data.opciones.length);
            } else {
                bloqueoActivo = false;
                puzzleArea.style.display = 'none';
            }

            data.opciones.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = `> ${opt.texto}`;
                btn.onclick = () => {
                    if (bloqueoActivo) showMessage("! ERROR: ACCESO DENEGADO. CORTAFUEGOS ACTIVO.", true);
                    else loadChapter(opt.destino);
                };
                optionsDiv.appendChild(btn);
            });
        } catch (e) { showMessage("!! ERROR: NÚCLEO ECHO FUERA DE LÍNEA", true); }
    }

    async function checkAnswer(id, numOpts) {
        const val = document.getElementById('puzzle-input').value;
        const response = await fetch(`${VALIDAR_URL}${id}?respuesta=${val}`);
        const data = await response.json();
        
        if (data.status === "success") {
            bloqueoActivo = false;
            showMessage(">> CÓDIGO ACEPTADO. CORTAFUEGOS DESACTIVADO.", false);
            if (numOpts === 0) setTimeout(() => loadChapter(data.siguiente_id), 1500);
        } else {
            showMessage("!! CÓDIGO ERRÓNEO. INTENTO REGISTRADO.", true);
        }
    }

    function showMessage(msg, isError) {
        const div = document.getElementById('system-message');
        div.innerText = msg;
        div.style.color = isError ? "#ff003c" : "#00ff41";
    }

    function typewriter(text) {
        const div = document.getElementById('content');
        let i = 0;
        const interval = setInterval(() => {
            div.innerText += text.charAt(i);
            i++;
            if (i >= text.length) clearInterval(interval);
        }, 20);
    }
</script>
</body>
</html>
